<!DOCTYPE html>

        <style>
            body{

            .main_navigation{

                width: 20%;

                border-radius: 20px;

            .btn:hover{

            }
            .btn:active{

            .main_menu{

                width: 80%;
                height: 85vh;
                left: 20%;

                border-style:groove;
            }
            table{
                position: relative;
                margin-top: 4%;
                width: 100%;
                height: 10vh;
            }
            th{
                height: 40px;

            .table_div2{

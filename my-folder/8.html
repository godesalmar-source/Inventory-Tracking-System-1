<!DOCTYPE html>
<html>
    <head>
        <title>Expiring Products</title>
        <style>
            body{
                background-image: url();
                background-size: cover;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            .main_navigation{
                position: absolute;
                top: 0px;
                left: 0px;
                width: 20%;
                height: 100vh;
                background-color: rgb(122, 122, 122);
                

            }
            .btn{
                background-color: transparent;
                position: relative;
                width: 100%;
                height: 10%;;
                border: none;
                font-family: Arial;
                font-size: large;
                font: bold;
                border-radius: 20px;
            }
            .btn:hover{
                background-color: rgb(112, 112, 112);
            }
            .btn:active{
                background-color: rgb(102, 102, 102);

            }
            .main_menu{
                position: absolute;
                left:20%;
                top: 0px;
                height: 15%;
                width: 80%;
                background-color: rgb(168, 168, 168);
            }  
            .table_div{
                position: absolute;
                width: 80%;
                height: 85vh;
                left: 20%;
                top: 15%;
            }
            table, tr, td{
                border: solid;  
                border-style:groove;
            }
            table{
                width: 100%;
                height: 10vh;
            }
            th{
                height: 40px;
            }
            
        </style>
        
    </head>

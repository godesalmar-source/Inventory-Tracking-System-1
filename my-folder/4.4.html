<!DOCTYPE html>
<html>
    <head>
        <title>Unload Stock</title>
        <style>
            body{
                background-image: url();
                background-size: cover;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            .main_navigation{
                position: absolute;
                top: 0px;
                left: 0px;
                width: 20%;
                height: 100vh;
                background-color: rgb(122, 122, 122);
                

            }
            .btn{
                background-color: transparent;
                position: relative;
                width: 100%;
                height: 10%;;
                border: none;
                font-family: Arial;
                font-size: large;
                font: bold;
                border-radius: 20px;
            }
            .btn:hover{
                background-color: rgb(112, 112, 112);
            }
            .btn:active{
                background-color: rgb(102, 102, 102);

            }
            .main_menu{
                position: absolute;
                left:20%;
                top: 0px;
                height: 15%;
                width: 80%;
                background-color: rgb(168, 168, 168);
            }  
            .table_div{
                position: absolute;
                width: 80%;
                height: 85vh;
                left: 22%;
                top: 15%;
            }
            .table_div2{
                position: absolute;
                width: 50%;
                left: 40%;
                top: 5%;
            }
            .input_div{
                position: absolute;
                left: 0%;
                top: 5%;
                width: 30%;
                height: 50vh;
                border-radius: 20px;
                background-color: rgb(122, 122, 122);
            }
            .output_div{
                position: relative;
                margin-top: 3%;
                width: 100%;
                height: 20vh;
                border-radius: 20px;
                background-color: rgb(122, 122, 122);
                text-align: center;

            }
            table, tr, td{
                border: solid;  
                border-style:groove;
            }
            table{
                position: relative;
                top: 0%;
                width: 100%;
                height: 10vh;
            }
            th{
                height: 40px;
            }

        </style>
        
    </head>
    <body>
        <div class="main_navigation">
            <a href="Inventory.html">
                <button class="btn">Main Menu</button>
            </a>

            <a href="1.html">

            <a href="2.html">

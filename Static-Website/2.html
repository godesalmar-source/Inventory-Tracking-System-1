<!DOCTYPE html>

        <style>

                border-radius: 20px;
            }
            .btn:hover{

            }
            .btn:active{

            }
            .main_menu{

                left:20%;

                background-color: rgb(122, 122, 122);
            }
            .output_div{
                position: absolute;
                left: 17.5%;
                top: 70%;
                width: 65%;
                height: 20vh;
                border-radius: 20px;
                background-color: rgb(122, 122, 122);

    </head>

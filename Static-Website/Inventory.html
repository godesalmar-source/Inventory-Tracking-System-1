<!DOCTYPE html>
<html>
    <head>
        <title>Inventory</title>
        <style>
            body{
                background-image: url();
                background-size: cover;
            }
            * {
                margin: 0;
                padding: 0;
                box-sizing: border-box;
            }
            .main_navigation{
                position: absolute;
                top: 0px;
                left: 0px;
                width: 20%;
                height: 100vh;
                background-color: rgb(122, 122, 122);
                

            }
            .btn{
                background-color: transparent;
                position: relative;
                width: 100%;
                height: 10%;;
                border: none;
                font-family: Arial;
                font-size: large;
                font: bold;
                border-radius: 20px;
            }
            .btn:hover{
                background-color: rgb(112, 112, 112);
            }
            .btn:active{
                background-color: rgb(102, 102, 102);

            }
            .main_menu{
                position: absolute;
                left:20%;
                top: 0px;
                height: 15%;
                width: 80%;
                background-color: rgb(168, 168, 168);
            }  
            .table_div{
                position: absolute;
                width: 80%;
                height: 85vh;
                left: 20%;
                top: 15%;
            }
            .table_div img {
                width: 100%;
                height: 100%;
                object-fit: cover;
            }

            
        </style>
        
    </head>
    <body>
        <div class="main_navigation">
            <a href="Inventory.html">
                <button class="btn">Main Menu</button>
            </a>
            <a href="1.html">
                <button class="btn">View Storage</button>
            </a>

            <a href="2.html">
                <button class="btn">Search Product /  View Product Batches</button>
            </a>

            <a href="3.html">
                <button class="btn">Load Stock</button>
            </a>

            <a href="4.html">
                <button class="btn">Unload Stock</button>
            </a>
            
            <a href="5.html">
                <button class="btn">Update Product</button>
            </a>

            <a href="6.html">
                <button class="btn">Add Product</button>
            </a>
            
            <a href="7.html">
                <button class="btn">Remove Product</button>
            </a>

            <a href="8.html">
                <button class="btn"> View Expiring Products</button>
            </a>

            <a href="9.html">
                <button class="btn">View Expired Products</button>
            </a>

        </div>

        <div class="main_menu">
            <h1 style="position: relative; text-align: center; top: 30%;">Main Menu</h1>
        </div>


        <div class="table_div">
            <img src="menu (3).png" alt="Welcome, List of Members">
        </div>
    </body>
</html>
